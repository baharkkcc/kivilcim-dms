version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: dms_user
      POSTGRES_PASSWORD: dms_password
      POSTGRES_DB: dms_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://dms_user:dms_password@postgres:5432/dms_db
    volumes:
      - backend_storage:/app/storage
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8502:8501"
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:8000
    restart: unless-stopped

volumes:
  postgres_data:
  backend_storage:
